<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简特效祝福</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 极简状态栏 */
        .status-bar {
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 8px 12px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .status-bar::before {
            content: "";
            position: absolute;
            left: 12px;
            width: 54px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            bottom: 4px;
        }
        
        /* 最大化动画区域 */
        .animation-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
            position: relative;
        }
        
        lottie-player {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
        }
        
        /* 浮动快捷按钮 */
        .float-buttons {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 0 16px;
            z-index: 10;
        }
        
        .float-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            padding: 8px 14px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            min-width: 60px;
            text-align: center;
        }
        
        .float-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        
        /* 超简洁输入区域 */
        .mini-input {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            padding: 12px 16px;
            border-top: 1px solid #e0e0e0;
            z-index: 100;
            height: 56px;
        }
        
        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
            height: 100%;
        }
        
        .mini-input-field {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 18px;
            font-size: 15px;
            outline: none;
            background: white;
            height: 36px;
        }
        
        .mini-input-field:focus {
            border-color: #07c160;
        }
        
        .mini-send-btn {
            background: #07c160;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        /* 极简提示 */
        .mini-hint {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            padding: 0 20px;
            z-index: 5;
        }
        
        /* 响应式调整 */
        @media (max-width: 480px) {
            .status-bar {
                height: 40px;
                font-size: 12px;
            }
            
            .float-buttons {
                bottom: 70px;
                gap: 6px;
            }
            
            .float-btn {
                padding: 6px 12px;
                font-size: 12px;
                min-width: 55px;
            }
            
            .mini-input {
                height: 52px;
                padding: 10px 14px;
            }
            
            .mini-input-field {
                height: 34px;
                font-size: 14px;
            }
            
            .mini-send-btn {
                width: 34px;
                height: 34px;
                font-size: 15px;
            }
        }
        
        /* 动画控制 */
        .animation-controls {
            position: absolute;
            top: 50px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }
        
        .control-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        
        .control-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            transform: scale(1.1);
        }
        
        /* 付费提示 */
        .premium-badge {
            position: absolute;
            bottom: 140px;
            right: 16px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 11px;
            cursor: pointer;
            animation: pulse 2s infinite;
            z-index: 10;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <!-- 极简状态栏 -->
    <div class="status-bar">
        <span id="current-time">18:33</span>
    </div>
    
    <!-- 最大化动画区域 -->
    <div class="animation-area">
        <lottie-player
            id="animation-player"
            src="animations/fireworks.json"
            background="transparent"
            speed="1"
            loop
            autoplay
        ></lottie-player>
        
        <!-- 极简提示 -->
        <div class="mini-hint" id="hint-text">
            输入祝福语触发特效
        </div>
        
        <!-- 浮动快捷按钮 -->
        <div class="float-buttons">
            <div class="float-btn" data-word="生日">🎂</div>
            <div class="float-btn" data-word="恭喜">🎉</div>
            <div class="float-btn" data-word="发财">💰</div>
            <div class="float-btn" data-word="爱情">❤️</div>
        </div>
        
        <!-- 动画控制按钮 -->
        <div class="animation-controls">
            <div class="control-btn" id="replay-btn" title="重播">↻</div>
            <div class="control-btn" id="pause-btn" title="暂停">⏸</div>
            <div class="control-btn" id="sound-btn" title="音效">🔊</div>
        </div>
        
        <!-- 付费提示 -->
        <div class="premium-badge" id="premium-badge" onclick="showPremium()">
            💎 高级版
        </div>
    </div>
    
    <!-- 超简洁输入区域 -->
    <div class="mini-input">
        <div class="input-wrapper">
            <input type="text" 
                   class="mini-input-field" 
                   id="message-input"
                   placeholder="说点什么..."
                   autocomplete="off">
            <button class="mini-send-btn" id="send-button">
                ➤
            </button>
        </div>
    </div>
    
    <script>
        // 更新时间
        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('current-time').textContent = `${hours}:${minutes}`;
        }
        
        // 初始化时间
        updateTime();
        setInterval(updateTime, 60000);
        
        // 关键词到动画文件的映射
        const keywordMap = {
            '生日': 'animations/cake.json',
            '恭喜': 'animations/fireworks.json',
            '发财': 'animations/money.json',
            '爱情': 'animations/rose.json'
        };
        
        // 获取动画播放器
        const player = document.getElementById('animation-player');
        let isPlaying = true;
        let hasSound = true;
        
        // 播放动画
        function playAnimation(animationFile) {
            player.load(animationFile);
            player.play();
            isPlaying = true;
            document.getElementById('pause-btn').textContent = '⏸';
            
            // 更新提示文字
            const hints = [
                '特效已触发！',
                '祝福已送达！',
                '动画播放中...',
                '效果很赞！'
            ];
            const randomHint = hints[Math.floor(Math.random() * hints.length)];
            document.getElementById('hint-text').textContent = randomHint;
            
            // 3秒后恢复默认提示
            setTimeout(() => {
                document.getElementById('hint-text').textContent = '输入祝福语触发特效';
            }, 3000);
        }
        
        // 处理输入的关键词
        function processInput() {
            const input = document.getElementById('message-input');
            const text = input.value.trim().toLowerCase();
            
            if (!text) {
                input.focus();
                return;
            }
            
            // 检查是否匹配关键词
            let matched = false;
            for (const keyword in keywordMap) {
                if (text.includes(keyword.toLowerCase())) {
                    playAnimation(keywordMap[keyword]);
                    matched = true;
                    break;
                }
            }
            
            // 如果没有匹配，播放默认动画
            if (!matched) {
                const defaultKeywords = ['生日', '恭喜', '发财', '爱情'];
                const randomKeyword = defaultKeywords[Math.floor(Math.random() * defaultKeywords.length)];
                playAnimation(keywordMap[randomKeyword]);
            }
            
            // 清空输入框
            input.value = '';
            input.focus();
        }
        
        // 快捷按钮点击事件
        document.querySelectorAll('.float-btn').forEach(button => {
            button.addEventListener('click', function() {
                const word = this.getAttribute('data-word');
                document.getElementById('message-input').value = word;
                processInput();
            });
        });
        
        // 发送按钮事件
        document.getElementById('send-button').addEventListener('click', processInput);
        
        // 输入框回车事件
        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                processInput();
            }
        });
        
        // 重播按钮
        document.getElementById('replay-btn').addEventListener('click', function() {
            player.play();
            isPlaying = true;
            document.getElementById('pause-btn').textContent = '⏸';
        });
        
        // 暂停/播放按钮
        document.getElementById('pause-btn').addEventListener('click', function() {
            if (isPlaying) {
                player.pause();
                this.textContent = '▶';
            } else {
                player.play();
                this.textContent = '⏸';
            }
            isPlaying = !isPlaying;
        });
        
        // 音效按钮
        document.getElementById('sound-btn').addEventListener('click', function() {
            hasSound = !hasSound;
            this.textContent = hasSound ? '🔊' : '🔇';
            // 这里可以添加音效控制逻辑
        });
        
        // 显示高级版信息
        function showPremium() {
            alert('🎁 高级版功能\n\n✨ 更多精美动画\n🎵 背景音乐\n📱 专属定制\n💼 商业授权\n\n联系微信: example\n定制价格: 500-3000元');
        }
        
        // 初始播放一个动画
        setTimeout(() => {
            playAnimation('animations/fireworks.json');
        }, 500);
        
        // 触摸优化
        document.addEventListener('touchstart', function() {}, {passive: true});
        
        // 防止双击缩放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
        
        // 页面加载完成提示
        window.addEventListener('load', function() {
            console.log('🎯 极简特效页面加载完成');
            console.log('💡 设计理念: 最大化动画区域，极简操作');
        });
    </script>
</body>
</html>
